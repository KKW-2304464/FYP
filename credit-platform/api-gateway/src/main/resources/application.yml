spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          "[/**]":
            allowedOriginPatterns:
              - "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            exposedHeaders:
              - Content-Disposition
            allowCredentials: false
      routes:
        - id: auth-service
          uri: ${AUTH_BASE_URL:http://localhost:8082}
          predicates:
            - Path=/api/auth/**
        - id: core-service
          uri: ${CORE_BASE_URL:http://localhost:8080}
          predicates:
            - Path=/api/applications/**,/api/reports/**,/api/admin/**,/api/model/**

server:
  port: 8088

security:
  jwt:
    issuer: ${JWT_ISSUER:fyp-credit-system}
    secret: ${JWT_SECRET:change-this-local-demo-secret-32-bytes-minimum}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
