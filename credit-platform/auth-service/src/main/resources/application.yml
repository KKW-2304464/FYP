spring:
  application:
    name: auth-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/auth_db}
    username: ${SPRING_DATASOURCE_USERNAME:core}
    password: ${SPRING_DATASOURCE_PASSWORD:core}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: false

server:
  port: 8082

security:
  jwt:
    issuer: ${JWT_ISSUER:fyp-credit-system}
    secret: ${JWT_SECRET:change-this-local-demo-secret-32-bytes-minimum}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:480}

auth:
  admin:
    enabled: ${SEED_ADMIN_ENABLED:true}
    email: ${SEED_ADMIN_EMAIL:admin@fyp.test}
    password: ${SEED_ADMIN_PASSWORD:Admin123!}
    name: ${SEED_ADMIN_NAME:FYP Admin}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
